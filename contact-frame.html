<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/font-awesome.min.css">
  <link rel="stylesheet" href="assets/css/theme-unisza.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    body { font-family: Roboto, sans-serif; }
    .frame-form-wrap { padding: 0 28px 28px; }
    .frame-status { margin: 0 0 16px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .frame-status.error { display: block; border: 1px solid #ff5a72; background: rgba(255, 90, 114, 0.1); color: #ffb4c0; }
    .frame-status.success { display: block; border: 1px solid rgba(16, 221, 180, 0.5); background: rgba(16, 221, 180, 0.1); color: #10ddb4; }
    @media (max-width: 767px) { .frame-form-wrap { padding: 0 20px 20px; } }
  </style>
</head>
<body class="page-contact-frame">
  <div class="frame-form-wrap">
    <p id="frameStatus" class="frame-status" role="alert" aria-live="polite"></p>

    <form id="contactForm" class="contact-form-pro" action="https://formsubmit.co/ajax/safwanaman2003@gmail.com" method="POST" data-quillbot="false" data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false" spellcheck="false">
      <input type="hidden" name="_subject" value="Portfolio inquiry from AmanSafwan website">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" id="formNext" value="">

      <div class="contact-field-row">
        <div class="contact-field">
          <label for="name">Full Name <span class="contact-required">*</span></label>
          <div class="contact-input-wrap">
            <i class="fa fa-user" aria-hidden="true"></i>
            <input type="text" id="name" name="name" placeholder="Your full name" minlength="2" maxlength="120" required autocomplete="name" readonly onfocus="this.removeAttribute('readonly');" data-quillbot="false" data-gramm="false">
          </div>
        </div>
        <div class="contact-field">
          <label for="email">Email Address <span class="contact-required">*</span></label>
          <div class="contact-input-wrap">
            <i class="fa fa-envelope" aria-hidden="true"></i>
            <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" inputmode="email" autocapitalize="off" autocorrect="off" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" data-quillbot="false" data-gramm="false">
          </div>
        </div>
      </div>

      <div class="contact-field-row">
        <div class="contact-field">
          <label for="organization">Company / Organization</label>
          <div class="contact-input-wrap">
            <i class="fa fa-building" aria-hidden="true"></i>
            <input type="text" id="organization" name="organization" placeholder="Optional" maxlength="120" autocomplete="organization" readonly onfocus="this.removeAttribute('readonly');" data-quillbot="false">
          </div>
        </div>
        <div class="contact-field">
          <label for="inquiry">Inquiry Type <span class="contact-required">*</span></label>
          <div class="contact-input-wrap contact-input-wrap--select">
            <i class="fa fa-tag" aria-hidden="true"></i>
            <select id="inquiry" name="inquiry" required data-quillbot="false">
              <option value="Internship Opportunity" selected>Internship Opportunity</option>
              <option value="Project Collaboration">Project Collaboration</option>
              <option value="Freelance / Contract">Freelance / Contract</option>
              <option value="Academic / Research">Academic / Research</option>
              <option value="General Inquiry">General Inquiry</option>
            </select>
          </div>
        </div>
      </div>

      <div class="contact-field">
        <label for="message">Your Message <span class="contact-required">*</span></label>
        <div class="contact-input-wrap contact-input-wrap--textarea">
          <textarea id="message" name="message" rows="6" placeholder="Share the role title, project scope, expected timeline, and how you would like to collaborate." minlength="10" maxlength="3000" required readonly onfocus="this.removeAttribute('readonly');" data-quillbot="false" data-gramm="false" spellcheck="false"></textarea>
        </div>
        <div class="contact-field-meta">
          <span id="messageHint" class="contact-char-count">Minimum 10 characters</span>
          <span class="contact-field-tip"><i class="fa fa-lightbulb-o"></i> Clear details help me respond faster</span>
        </div>
      </div>

      <div class="contact-form-actions">
        <button type="submit" id="contactSendBtn" class="site-btn contact-submit-btn"><i class="fa fa-paper-plane"></i> Send Message</button>
        <a href="mailto:safwanaman2003@gmail.com?subject=Portfolio%20Inquiry" target="_parent" class="contact-email-fallback"><i class="fa fa-envelope-o"></i> Email directly instead</a>
      </div>
      <p class="contact-form-note"><i class="fa fa-info-circle"></i> First submission activates FormSubmit. Check Gmail (and spam) for the activation link from FormSubmit.</p>
    </form>
  </div>
  <script src="assets/js/contact-frame.js"></script>
</body>
</html>
